<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-label="Rare Intelligence">
  <defs>
    <linearGradient id="mGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2D3580"/>
      <stop offset="0.45" stop-color="#1A4FBF"/>
      <stop offset="0.78" stop-color="#0E7FA8"/>
      <stop offset="1" stop-color="#00C9B1"/>
    </linearGradient>
    <pattern id="mZebra" width="9" height="9" patternUnits="userSpaceOnUse" patternTransform="rotate(-35)">
      <line x1="0" y1="0" x2="0" y2="9" stroke="#FFFFFF" stroke-width="2" opacity="0.12"/>
    </pattern>
    <clipPath id="mClip"><circle cx="90" cy="90" r="78"/></clipPath>
  </defs>
  <circle cx="90" cy="90" r="78" fill="url(#mGrad)"/>
  <rect x="12" y="12" width="156" height="156" fill="url(#mZebra)" clip-path="url(#mClip)"/>
  <circle cx="90" cy="90" r="78" fill="none" stroke="#00C9B1" stroke-width="5"/>
  <text x="90" y="94" text-anchor="middle" dominant-baseline="central"
        font-family="'Bricolage Grotesque', Verdana, sans-serif" font-weight="800" font-size="68"
        fill="#EEF8F7" letter-spacing="1">RI</text>
</svg>
