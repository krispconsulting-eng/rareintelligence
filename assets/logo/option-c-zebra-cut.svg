<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 180" role="img" aria-label="Rare Intelligence">
  <defs>
    <linearGradient id="cGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2D3580"/>
      <stop offset="0.5" stop-color="#1A4FBF"/>
      <stop offset="1" stop-color="#00C9B1"/>
    </linearGradient>
    <clipPath id="cSquircle">
      <rect x="24" y="24" width="132" height="132" rx="38"/>
    </clipPath>
  </defs>
  <!-- Squircle badge -->
  <rect x="24" y="24" width="132" height="132" rx="38" fill="#0E1C35" stroke="#00C9B1" stroke-width="3"/>
  <!-- zebra stripes cutting through, clipped to badge -->
  <g clip-path="url(#cSquircle)">
    <g transform="rotate(-35 90 90)">
      <rect x="-40" y="20" width="220" height="9" fill="#1A4FBF" opacity="0.5"/>
      <rect x="-40" y="52" width="220" height="9" fill="#0E7FA8" opacity="0.5"/>
      <rect x="-40" y="118" width="220" height="9" fill="#3DD6C8" opacity="0.45"/>
      <rect x="-40" y="150" width="220" height="9" fill="#1A4FBF" opacity="0.4"/>
    </g>
  </g>
  <!-- RI in gradient -->
  <text x="90" y="94" text-anchor="middle" dominant-baseline="central"
        font-family="'Bricolage Grotesque', sans-serif" font-weight="800" font-size="58"
        fill="url(#cGrad)" letter-spacing="1">RI</text>
  <!-- corner accent -->
  <circle cx="150" cy="36" r="7" fill="#00C9B1"/>
  <!-- Wordmark -->
  <text x="190" y="74" font-family="'Bricolage Grotesque', sans-serif" font-weight="800"
        font-size="40" fill="#EEF8F7" letter-spacing="1">RARE</text>
  <text x="190" y="120" font-family="'Bricolage Grotesque', sans-serif" font-weight="800"
        font-size="40" fill="#EEF8F7" letter-spacing="0.5">INTELLIGENCE</text>
</svg>
