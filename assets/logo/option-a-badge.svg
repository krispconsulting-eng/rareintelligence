<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 180" role="img" aria-label="Rare Intelligence">
  <defs>
    <linearGradient id="aGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2D3580"/>
      <stop offset="0.45" stop-color="#1A4FBF"/>
      <stop offset="0.78" stop-color="#0E7FA8"/>
      <stop offset="1" stop-color="#00C9B1"/>
    </linearGradient>
    <pattern id="aZebra" width="9" height="9" patternUnits="userSpaceOnUse" patternTransform="rotate(-35)">
      <line x1="0" y1="0" x2="0" y2="9" stroke="#FFFFFF" stroke-width="2" opacity="0.12"/>
    </pattern>
    <clipPath id="aClip"><circle cx="90" cy="90" r="66"/></clipPath>
  </defs>
  <!-- Badge -->
  <circle cx="90" cy="90" r="66" fill="url(#aGrad)"/>
  <rect x="24" y="24" width="132" height="132" fill="url(#aZebra)" clip-path="url(#aClip)"/>
  <circle cx="90" cy="90" r="66" fill="none" stroke="#00C9B1" stroke-width="4"/>
  <circle cx="90" cy="90" r="58" fill="none" stroke="#EEF8F7" stroke-width="1.2" opacity="0.25"/>
  <text x="90" y="92" text-anchor="middle" dominant-baseline="central"
        font-family="'Bricolage Grotesque', sans-serif" font-weight="800" font-size="54"
        fill="#EEF8F7" letter-spacing="1">RI</text>
  <!-- Wordmark -->
  <text x="186" y="74" font-family="'Bricolage Grotesque', sans-serif" font-weight="800"
        font-size="40" fill="#EEF8F7" letter-spacing="1">RARE</text>
  <text x="186" y="120" font-family="'Bricolage Grotesque', sans-serif" font-weight="800"
        font-size="40" fill="#EEF8F7" letter-spacing="0.5">INTELLIGENCE</text>
</svg>
