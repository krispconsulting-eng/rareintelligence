<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 180" role="img" aria-label="Rare Intelligence">
  <defs>
    <linearGradient id="bCore" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#152844"/>
      <stop offset="1" stop-color="#0E1C35"/>
    </linearGradient>
  </defs>
  <!-- Signature ring: 10 dots cycling the brand family around a teal core -->
  <g>
    <circle cx="90" cy="90" r="58" fill="url(#bCore)" stroke="#1A4FBF" stroke-width="1" opacity="0.9"/>
    <!-- dots -->
    <g>
      <circle cx="90"  cy="22"  r="6.5" fill="#00C9B1"/>
      <circle cx="138" cy="42"  r="6.5" fill="#3DD6C8"/>
      <circle cx="158" cy="90"  r="6.5" fill="#0E7FA8"/>
      <circle cx="138" cy="138" r="6.5" fill="#1A4FBF"/>
      <circle cx="90"  cy="158" r="6.5" fill="#2D3580"/>
      <circle cx="42"  cy="138" r="6.5" fill="#1A4FBF"/>
      <circle cx="22"  cy="90"  r="6.5" fill="#0E7FA8"/>
      <circle cx="42"  cy="42"  r="6.5" fill="#3DD6C8"/>
      <circle cx="66"  cy="28"  r="4"   fill="#80EAD8"/>
      <circle cx="114" cy="28"  r="4"   fill="#80EAD8"/>
    </g>
    <circle cx="90" cy="90" r="68" fill="none" stroke="#00C9B1" stroke-width="2" opacity="0.55"/>
    <text x="90" y="92" text-anchor="middle" dominant-baseline="central"
          font-family="'Bricolage Grotesque', sans-serif" font-weight="800" font-size="46"
          fill="#EEF8F7" letter-spacing="1">RI</text>
  </g>
  <!-- Wordmark -->
  <text x="190" y="74" font-family="'Bricolage Grotesque', sans-serif" font-weight="800"
        font-size="40" fill="#EEF8F7" letter-spacing="1">RARE</text>
  <text x="190" y="120" font-family="'Bricolage Grotesque', sans-serif" font-weight="800"
        font-size="40" fill="#00C9B1" letter-spacing="0.5">INTELLIGENCE</text>
</svg>
